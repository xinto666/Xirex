<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>9ezEsports | Официальный сайт</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #050505;
            color: white;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }
        .font-cyber { font-family: 'Orbitron', sans-serif; }
        
        /* Анимация появления */
        .reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.8s ease-out;
        }
        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        /* Агрессивный градиент для текста */
        .text-gradient {
            background: linear-gradient(90deg, #ccff00, #57ffcd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Эффект свечения для кнопок */
        .btn-9ez {
            position: relative;
            background: #ccff00;
            color: black;
            font-weight: 900;
            text-transform: uppercase;
            transition: 0.3s;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0% 100%);
        }
        .btn-9ez:hover {
            box-shadow: 0 0 20px #ccff00;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <!-- Навигация -->
    <nav class="flex justify-between items-center p-6 border-b border-white/10 backdrop-blur-md sticky top-0 z-50">
        <div class="text-2xl font-cyber font-black tracking-tighter">9ez<span class="text-[#ccff00]">ESPORTS</span></div>
        <div class="space-x-8 font-bold uppercase text-sm tracking-widest hidden md:flex">
            <a href="#" class="hover:text-[#ccff00] transition">Состав</a>
            <a href="#" class="hover:text-[#ccff00] transition">Матчи</a>
            <a href="#" class="hover:text-[#ccff00] transition">Информация</a>
            <a href="#" class="hover:text-[#ccff00] transition">Спонсоры</a>
        </div>
        <button class="btn-9ez px-8 py-2">Спонсоры</button>
    </nav>

    <!-- Hero Секция -->
    <section class="h-[90vh] flex flex-col justify-center items-center text-center relative overflow-hidden">


<!-- Задний фон с эффектом -->
        <div class="absolute inset-0 bg-[url('https://создай-свой-фон-тут.jpg')] bg-cover bg-center opacity-20 grayscale"></div>
        <div class="absolute inset-0 bg-gradient-to-t from-[#050505] via-transparent to-transparent"></div>

        <h1 class="reveal font-cyber text-6xl md:text-9xl font-black mb-4 tracking-tighter active">
             <span class="text-gradient">9ez</span> Esports
        </h1>
        <p class="reveal text-gray-400 text-lg md:text-2xl max-w-2xl active" style="transition-delay: 0.2s;">
            Доминируем в CS2. Не просто играем, а создаем историю. 
        </p>
        
        <div class="reveal mt-10 active" style="transition-delay: 0.4s;">
            <button class="border-2 border-[#ccff00] text-[#ccff00] px-10 py-3 font-black uppercase tracking-widest hover:bg-[#ccff00] hover:text-black transition duration-300">
                Смотреть игру
            </button>
        </div>
    </section>

    <!-- Секция игроков (Карточки) -->
    <section class="py-20 px-6 max-w-7xl mx-auto">
        <h2 class="font-cyber text-4xl mb-12 border-l-4 border-[#ccff00] pl-4">АКТИВНЫЙ РОСТЕР</h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            
            <!-- Карточка игрока -->
            <div class="reveal bg-[#121212] border border-white/5 p-4 group cursor-pointer hover:border-[#ccff00]/50 transition">
                <div class="h-80 bg-gray-800 mb-4 overflow-hidden relative">
                    <img src="https://via.placeholder.com/400x600" alt="Player" class="grayscale group-hover:grayscale-0 transition duration-500 object-cover w-full h-full">
                    <div class="absolute bottom-0 left-0 bg-[#ccff00] text-black px-4 py-1 font-black">AWP</div>
                </div>
                <h3 class="font-cyber text-2xl uppercase italic">xinto</h3>
                <p class="text-gray-500 font-bold">Матвей</p>
            </div>

            <!-- Дубликаты для примера -->
            <div class="reveal bg-[#121212] border border-white/5 p-4 group cursor-pointer hover:border-[#ccff00]/50 transition" style="transition-delay: 0.1s;">
                <div class="h-80 bg-gray-800 mb-4 overflow-hidden relative">
                    <img src="https://via.placeholder.com/400x600" alt="Player" class="grayscale group-hover:grayscale-0 transition duration-500 object-cover w-full h-full">
                    <div class="absolute bottom-0 left-0 bg-[#ccff00] text-black px-4 py-1 font-black">IGL</div>
                </div>
                <h3 class="font-cyber text-2xl uppercase italic">ba7ka</h3>
                <p class="text-gray-500 font-bold">Ваня</p>
            </div>

            <div class="reveal bg-[#121212] border border-white/5 p-4 group cursor-pointer hover:border-[#ccff00]/50 transition" style="transition-delay: 0.2s;">
                <div class="h-80 bg-gray-800 mb-4 overflow-hidden relative">
                    <img src="https://via.placeholder.com/400x600" alt="Player" class="grayscale group-hover:grayscale-0 transition duration-500 object-cover w-full h-full">
                    <div class="absolute bottom-0 left-0 bg-[#ccff00] text-black px-4 py-1 font-black">ENTRY</div>
                </div>
                <h3 class="font-cyber text-2xl uppercase italic">mef0mu</h3>
                <p class="text-gray-500 font-bold">Дима</p>
            </div>

        </div>
    </section>

    <script>
        // Простой скрипт для анимации появления при скролле
        const observerOptions = { threshold: 0.1 };
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('active');
                }
            });
        }, observerOptions);

        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    </script>
</body>
</html>
